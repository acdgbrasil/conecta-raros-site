version: '1.2'

summary:
  generatePRSummary: true
  customInstructions: >
    Summarize changes by type: content (HTML), styling (CSS), behavior (JS),
    infrastructure (Docker/nginx), and SEO. Highlight security concerns.
  behaviourForExistingDescription: concatenate

ignorePaths:
  - node_modules/
  - '*.lock'
  - .env
  - .env.*
  - coverage/
  - handbook/

baseBranches: []

reviewOptions:
  security: true
  code_style: true
  kody_rules: true
  refactoring: true
  error_handling: true
  maintainability: true
  potential_issues: true
  documentation_and_comments: false
  performance_and_optimization: true
  business_logic: false

suggestionControl:
  groupingMode: full
  limitationType: pr
  maxSuggestions: 9
  severityLevelFilter: medium

ignoredTitleKeywords:
  - chore
  - docs
  - ci

automatedReviewActive: true
pullRequestApprovalActive: false
isRequestChangesActive: false
llmGeneratedMemoriesRequireApproval: false
