name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  # ---- Job 1: Testes e qualidade ----
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node (Simulated Frontend Env)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install dependencies
        run: make deps

      - name: Build
        run: make build-release

      - name: Test with coverage gate
        run: make coverage

  # ---- Job 2: SBOM ----
  sbom:
    name: SBOM
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    uses: acdgbrasil/.github/.github/workflows/reusable-sbom.yml@main
    permissions:
      contents: write

  # ---- Job 3: Build e push da imagem ----
  image:
    name: Build & Publish Image
    needs: test
    if: github.event_name == 'push'
    uses: acdgbrasil/.github/.github/workflows/reusable-ghcr-build-push.yml@main
    with:
      service: svc-conecta-raros-frontend
    permissions:
      contents: read
      packages: write
